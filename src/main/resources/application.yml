# ==================== 共享配置（所有环境） ====================
server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 100

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  token-name: token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false

app:
  upload-path: ${UPLOAD_PATH:E:/workspace/Ghost Fire Forum/uploads}
  allowed-origins: http://localhost:5173
  view-flush-interval: 30000

wechat:
  mini:
    appId: ${WX_APP_ID:wx_demo_appid}
    appSecret: ${WX_APP_SECRET:wx_demo_secret}
