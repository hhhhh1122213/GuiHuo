# ==================== 本地开发配置 ====================
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ghostfire
    username: postgres
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0

logging:
  level:
    com.ghostfire: DEBUG
    org.mybatis: DEBUG
